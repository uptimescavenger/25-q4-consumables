services:
  - type: web
    name: uptimehealth-procurement
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
